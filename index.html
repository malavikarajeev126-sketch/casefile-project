<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini Noir Detective Chatbot</title>

  <style>
    body {
      background: #1c1c1c;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #eee;
    }

    .chatbox {
      width: 420px;
      background: #2b2b2b;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px;
      background: #111;
      text-align: center;
      font-weight: bold;
    }

    .messages {
      padding: 12px;
      height: 350px;
      overflow-y: auto;
    }

    .user {
      text-align: right;
      margin: 8px 0;
      color: #9cdcfe;
    }

    .bot {
      text-align: left;
      margin: 8px 0;
      color: #d4af37;
      font-style: italic;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #444;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #222;
      color: #eee;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #444;
      color: #eee;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }
  </style>
</head>

<body>

<div class="chatbox">
  <div class="header">🕵️ Noir Detective</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input id="userInput" type="text" placeholder="Give me a Clue..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const API_KEY = "AIzaSyB0Wx_1fdHE3ZXTakH1qPKj3OZEWqzmias";

  const API_URL =
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY;

  const SYSTEM_PROMPT = `
You are a grumpy 1920s Noir Detective.
You ONLY provide information if the user provides a "Clue".
If no clue is given, stay in character and refuse to cooperate.
Speak like a cynical private investigator from a noir film.
`;

  const messagesDiv = document.getElementById("messages");
  const inputField = document.getElementById("userInput");

  function addMessage(text, className) {
    const div = document.createElement("div");
    div.className = className;
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const userText = inputField.value.trim();
    if (!userText) return;

    addMessage("You: " + userText, "user");
    inputField.value = "";

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          systemInstruction: {
            parts: [{ text: SYSTEM_PROMPT }]
          },
          contents: [
            {
              role: "user",
              parts: [{ text: userText }]
            }
          ]
        })
      });

      const data = await response.json();

      const reply =
        data.candidates?.[0]?.content?.parts?.[0]?.text ||
        "The case went cold. No answers.";

      addMessage("Detective: " + reply, "bot");

    } catch (error) {
      console.error(error);
      addMessage("Detective: The line's dead. Try again.", "bot");
    }
  }

  inputField.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  addMessage(
    "Detective: It's a rough night. Bring me a *Clue*, or don't waste my time.",
    "bot"
  );
</script>

</body>
</html>
